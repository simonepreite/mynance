name: CI

# Story 1.1, AC6: gate lint, type-check, tests and build on main.
# Any failing step fails the pipeline (GitHub Actions fails a job on the first
# non-zero step; no step uses continue-on-error or masks its exit code).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · lint · types · migrate · tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      db:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changethis
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ENVIRONMENT: local
      PROJECT_NAME: mynance
      SECRET_KEY: ci-not-a-real-secret
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changethis
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: changethis
      BACKEND_CORS_ORIGINS: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python (matches backend requires-python)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.21"
      - name: Install dependencies
        run: uv sync
        working-directory: backend
      - name: Lint (ruff)
        run: uv run ruff check .
        working-directory: backend
      - name: Format check (ruff)
        run: uv run ruff format --check .
        working-directory: backend
      - name: Type-check (mypy)
        run: uv run mypy app
        working-directory: backend
      - name: Migrate database (Alembic)
        run: uv run alembic upgrade head
        working-directory: backend
      - name: Tests (pytest)
        run: uv run pytest
        working-directory: backend

  frontend:
    name: Frontend · lint · types · build · theme e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node (pinned via .nvmrc, Vite needs >=22.12)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint (biome)
        run: bunx biome ci .
        working-directory: frontend
      - name: Type-check + build (tsc + vite)
        run: bun run build
        working-directory: frontend
      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium
        working-directory: frontend
      - name: Morbido smoke tests (theme tokens + component library)
        run: bunx playwright test --project=theme
        working-directory: frontend
